<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>园区网流量路径逻辑演示</title>
    <style>
        :root {
            --bg-dark: #0b1121;
            --bg-panel: #111a2f;
            --line-color: #2e4370;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --node-bg: #152039;
            --node-border: #3b5a94;
            --color-oa: #00d2ff;
            --color-pr: #ff9900;
            --color-vpn: #d400ff;
            --color-wlan: #00ff66;
            --color-capwap: #b45f06;
            --color-err: #ff3333;
            --font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部信息栏 */
        .header {
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .header-title h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .header-title p {
            font-size: 14px;
            color: var(--text-sub);
            transition: color 0.3s;
        }

        .header-status {
            text-align: right;
            font-size: 13px;
        }
        
        .header-status div {
            margin-bottom: 6px;
            color: var(--text-sub);
        }

        .header-status span {
            color: var(--color-oa);
            font-weight: bold;
            margin-left: 8px;
        }

        /* 拓扑图容器 */
        .topology-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #111a2f 0%, #0b1121 100%);
            padding-top: 90px;
            padding-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .topology-container > svg {
            width: 100%;
            height: 100%;
            /* 放宽最大限制以支持超宽屏饱满显示 */
            max-width: 1800px;
            display: block;
        }

        /* 严格限制标题图标大小 */
        .header-title h1 svg {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        /* SVG样式优化：全局加粗加大 */
        .static-line {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 3;
            transition: stroke 0.3s, opacity 0.3s;
        }

        .tunnel-line {
            fill: none;
            transition: opacity 0.3s;
        }
        
        .dashed-line {
            stroke-dasharray: 8 8;
        }

        .node-circle {
            fill: var(--node-bg);
            stroke: var(--node-border);
            stroke-width: 4;
            transition: all 0.3s ease;
        }

        .node-icon {
            fill: #fff;
            transition: all 0.3s ease;
        }

        .node-title {
            fill: var(--text-main);
            font-size: 18px;
            font-weight: bold;
            text-anchor: middle;
            letter-spacing: 1px;
        }

        .node-subtitle {
            fill: var(--text-sub);
            font-size: 14px;
            text-anchor: middle;
        }

        .line-label {
            fill: var(--text-sub);
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            background: var(--bg-dark);
            letter-spacing: 1px;
        }

        /* 动画与状态类 */
        .flow-path {
            fill: none;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 12 24;
            opacity: 0;
            transition: opacity 0.4s;
            animation: flowAnim 1s linear infinite;
        }

        .flow-track {
            fill: none;
            stroke-width: 5;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .flow-active { opacity: 1; }

        @keyframes flowAnim {
            from { stroke-dashoffset: 36; }
            to { stroke-dashoffset: 0; }
        }

        .node.failed .node-circle {
            stroke: var(--color-err);
            fill: rgba(255, 51, 51, 0.1);
        }
        .node.failed .node-icon { fill: var(--color-err); }
        .node.failed .node-title { fill: var(--color-err); }
        .error-cross { opacity: 0; transition: opacity 0.3s; }
        .node.failed .error-cross { opacity: 1; }
        .node.dimmed { opacity: 0.3; }

        /* 颜色定义 */
        .stroke-oa { stroke: var(--color-oa); filter: drop-shadow(0 0 6px var(--color-oa)); }
        .stroke-pr { stroke: var(--color-pr); filter: drop-shadow(0 0 6px var(--color-pr)); }
        .stroke-vpn { stroke: var(--color-vpn); filter: drop-shadow(0 0 6px var(--color-vpn)); }
        .stroke-wlan { stroke: var(--color-wlan); filter: drop-shadow(0 0 6px var(--color-wlan)); }
        
        .track-oa { stroke: rgba(0, 210, 255, 0.2); }
        .track-pr { stroke: rgba(255, 153, 0, 0.2); }
        .track-vpn { stroke: rgba(212, 0, 255, 0.2); }
        .track-wlan { stroke: rgba(0, 255, 102, 0.2); }

        /* 底部控制面板 */
        .controls {
            background: var(--bg-panel);
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            border-top: 1px solid var(--line-color);
            z-index: 20;
        }

        .btn {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--line-color);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: #5572b4;
        }

        .btn.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--color-oa);
            border-color: var(--color-oa);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* 弹出的标签样式 */
        .pop-label {
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: bold;
            font-size: 14px;
        }
        .pop-label.show { opacity: 1; }
        .label-bg { fill: rgba(0,0,0,0.8); rx: 6; ry: 6; stroke: var(--line-color); stroke-width: 1; }

        /* AI 智能分析 UI 样式 */
        .ai-btn {
            background: linear-gradient(135deg, #00d2ff11, #d400ff22);
            color: #fff;
            border: 1px solid #5572b4;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-family: inherit;
            pointer-events: auto;
        }
        .ai-btn:hover {
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.4);
            border-color: #d400ff;
            background: linear-gradient(135deg, #00d2ff33, #d400ff44);
        }

        .ai-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(11, 17, 33, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        .ai-modal.show { display: flex; }
        .ai-panel {
            background: var(--bg-panel);
            border: 1px solid var(--line-color);
            border-radius: 12px;
            width: 600px;
            max-width: 90%;
            max-height: 80vh;
            padding: 24px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }
        .ai-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #d400ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            color: var(--text-sub);
            cursor: pointer; font-size: 20px;
            transition: color 0.3s;
        }
        .ai-close:hover { color: #fff; }
        .ai-content {
            overflow-y: auto;
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.8;
        }
        .ai-content strong { color: var(--color-oa); font-weight: bold; }
        .ai-loading {
            display: none;
            color: var(--color-oa);
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            <h1>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--color-oa)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                园区网流量路径逻辑演示
            </h1>
            <p id="desc-text">全网拓扑运行正常，主备链路状态良好，等待业务流量接入。</p>
            <button class="ai-btn" onclick="analyzeCurrentScenario()">✨ AI 专家深度解析本场景</button>
        </div>
        <div class="header-status">
            <div>当前模式 <span id="mode-text">正常就绪</span></div>
            <div>核心状态 <span id="core-text">双机冗余 (M-LAG)</span></div>
        </div>
    </div>

    <div class="topology-container">
        <!-- SVG绘图区域：重构了极致比例的 1100x850 宽屏专属 ViewBox -->
        <svg viewBox="50 50 1100 850" preserveAspectRatio="xMidYMid meet">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
                </pattern>
                
                <!-- 图标集 (全面放大了 scale 的数值，解决图标太小问题) -->
                <g id="icon-cloud" transform="scale(1.4) translate(-12, -12)"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></g>
                <g id="icon-hq" transform="scale(1.3) translate(-12, -12)"><path d="M4 2v20h16V2H4zm14 18H6V4h12v16zm-4-10H8v2h6v-2zm0 4H8v2h6v-2zM8 14v2h2v-2H8zM8 10v2h2v-2H8zM8 6v2h2V6H8z" fill="currentColor"/></g>
                <g id="icon-shield" transform="scale(1.3) translate(-12, -12)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
                <g id="icon-pulse" transform="scale(1.4) translate(-12, -12)"><path d="M2 12h5l2.5-6 4 13 3-7h5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
                <g id="icon-share" transform="scale(1.4) translate(-12, -12)"><circle cx="18" cy="5" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="19" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" stroke="currentColor" stroke-width="2"/></g>
                <g id="icon-pc" transform="scale(1.3) translate(-12, -12)"><rect x="2" y="3" width="20" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="2"/></g>
                <g id="icon-factory" transform="scale(1.4) translate(-12, -12)"><path d="M2 20V8l6 4V8l6 4V4h8v16H2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
                <g id="icon-camera" transform="scale(1.3) translate(-12, -12)"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="2"/></g>
                <g id="icon-wac" transform="scale(1.3) translate(-12, -12)"><path d="M5 12.55a11 11 0 0 1 14.08 0 M1.42 9a16 16 0 0 1 21.16 0 M8.53 16.11a6 6 0 0 1 6.95 0 M12 20h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
                <g id="icon-ap" transform="scale(1.1) translate(-12, -12)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" fill="currentColor"/></g>
                <g id="icon-mobile" transform="scale(1.2) translate(-12, -12)"><rect x="5" y="2" width="14" height="20" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
                <g id="icon-cross" transform="scale(1.2)"><path d="M-12 -12 L 12 12 M 12 -12 L -12 12" stroke="var(--color-err)" stroke-width="4" stroke-linecap="round"/></g>
            </defs>

            <!-- 背景网格 -->
            <rect width="100%" height="100%" fill="url(#grid)" />

            <!-- 1. 静态物理连线层 (横坐标已进行超宽比例延展) -->
            <g id="layer-static-lines">
                <!-- 垂直骨干链路 -->
                <path class="static-line" d="M 600 100 L 350 220" /> <!-- Net - FW1 -->
                <path class="static-line" d="M 600 100 L 850 220" /> <!-- Net - FW2 -->
                <path class="static-line dashed-line" d="M 850 100 L 350 220" /> <!-- HQ - FW1 -->
                <path class="static-line dashed-line" d="M 850 100 L 850 220" /> <!-- HQ - FW2 -->

                <path class="static-line" d="M 350 220 L 350 340" /> <!-- FW1 - AC1 -->
                <path class="static-line" d="M 850 220 L 850 340" /> <!-- FW2 - AC2 -->
                
                <path class="static-line" d="M 350 340 L 350 460" /> <!-- AC1 - Core1 -->
                <path class="static-line" d="M 850 340 L 850 460" /> <!-- AC2 - Core2 -->

                <!-- 无线控制器旁挂 -->
                <path class="static-line" d="M 350 460 L 150 390" /> <!-- Core1 - WAC1 -->
                <path class="static-line" d="M 850 460 L 150 530" /> <!-- Core2 - WAC2 -->

                <!-- 水平冗余链路 -->
                <path class="static-line dashed-line" d="M 390 220 L 810 220" /> <!-- FW HA -->
                <text x="600" y="212" class="line-label">HRP 心跳线</text>

                <path class="static-line dashed-line" d="M 390 340 L 810 340" /> <!-- AC Sync -->
                <text x="600" y="332" class="line-label">同步线</text>

                <path class="static-line dashed-line" stroke-width="4" d="M 390 460 L 810 460" /> <!-- Core Peer-link -->
                <text x="600" y="452" class="line-label">Peer-link</text>

                <path class="static-line dashed-line" d="M 150 390 L 150 530" /> <!-- WAC HA -->
                <text x="160" y="465" class="line-label" style="text-anchor: start;">WAC 同步线</text>

                <!-- 接入层双归属链路 -->
                <path class="static-line" d="M 350 460 L 150 630" /> <!-- Core1 - OA -->
                <path class="static-line" d="M 350 460 L 450 630" /> <!-- Core1 - PR -->
                <path class="static-line" d="M 350 460 L 750 630" /> <!-- Core1 - POE -->
                <path class="static-line" d="M 350 460 L 1050 630" /> <!-- Core1 - SP -->

                <path class="static-line" d="M 850 460 L 150 630" /> <!-- Core2 - OA -->
                <path class="static-line" d="M 850 460 L 450 630" /> <!-- Core2 - PR -->
                <path class="static-line" d="M 850 460 L 750 630" /> <!-- Core2 - POE -->
                <path class="static-line" d="M 850 460 L 1050 630" /> <!-- Core2 - SP -->

                <!-- 无线接入链路 -->
                <path class="static-line" d="M 750 630 L 750 730" /> <!-- POE - AP -->
                <path class="static-line dashed-line" d="M 750 730 L 600 820" /> <!-- AP - OA WLAN -->
                <path class="static-line dashed-line" d="M 750 730 L 900 820" /> <!-- AP - PR WLAN -->

                <!-- 预埋隧道标线 -->
                <path id="tunnel-vpn" class="tunnel-line dashed-line stroke-vpn" stroke-width="5" style="opacity: 0;" d="M 350 220 L 850 100" />
                <path id="tunnel-capwap" class="tunnel-line" stroke="var(--color-capwap)" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter" style="opacity: 0;" d="M 750 730 L 750 630 L 350 460 L 150 390" />
            </g>

            <!-- 2. 动态流量动画层 -->
            <g id="layer-flows">
                <g class="flow-group" id="flow-oa-net">
                    <path class="flow-track track-oa" d="M 150 630 L 350 460 L 350 340 L 350 220 L 600 100" />
                    <path class="flow-path stroke-oa" d="M 150 630 L 350 460 L 350 340 L 350 220 L 600 100" />
                </g>

                <g class="flow-group" id="flow-oa-pr">
                    <path class="flow-track track-oa" d="M 150 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-path stroke-oa" d="M 150 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-track track-pr" d="M 350 220 L 350 340 L 350 460 L 450 630" />
                    <path class="flow-path stroke-pr" d="M 350 220 L 350 340 L 350 460 L 450 630" />
                </g>

                <g class="flow-group" id="flow-vpn">
                    <path class="flow-track track-oa" d="M 150 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-path stroke-oa" d="M 150 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-track track-pr" d="M 450 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-path stroke-pr" d="M 450 630 L 350 460 L 350 340 L 350 220" />
                    <path class="flow-track track-vpn" d="M 350 220 L 850 100" />
                    <path class="flow-path stroke-vpn" d="M 350 220 L 850 100" />
                </g>

                <g class="flow-group" id="flow-backup">
                    <path class="flow-track track-oa" d="M 150 630 L 850 460 L 850 340 L 850 220 L 600 100" />
                    <path class="flow-path stroke-oa" d="M 150 630 L 850 460 L 850 340 L 850 220 L 600 100" />
                </g>

                <g class="flow-group" id="flow-fw-fail">
                    <path class="flow-track track-oa" d="M 150 630 L 350 460 L 850 460 L 850 340 L 850 220 L 600 100" />
                    <path class="flow-path stroke-oa" d="M 150 630 L 350 460 L 850 460 L 850 340 L 850 220 L 600 100" />
                </g>

                <g class="flow-group" id="flow-wlan">
                    <path class="flow-track track-wlan" d="M 600 820 L 750 730 L 750 630 L 350 460 L 150 390 L 350 460 L 350 340 L 350 220 L 600 100" />
                    <path class="flow-path stroke-wlan" d="M 600 820 L 750 730 L 750 630 L 350 460 L 150 390 L 350 460 L 350 340 L 350 220 L 600 100" />
                </g>
            </g>

            <!-- 3. 节点定义层 (整体放大了所有的节点半径 R) -->
            <g id="layer-nodes">
                <g class="node" id="node-net" transform="translate(600, 100)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-cloud" class="node-icon" />
                    <text y="65" class="node-title">互联网出口</text>
                    <text y="85" class="node-subtitle">Internet</text>
                </g>

                <g class="node" id="node-hq" transform="translate(850, 100)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-hq" class="node-icon" />
                    <text y="65" class="node-title">总部网络</text>
                    <text y="85" class="node-subtitle">HQ</text>
                </g>

                <g class="node" id="node-fw1" transform="translate(350, 220)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-shield" class="node-icon" />
                    <use href="#icon-cross" class="error-cross" />
                    <text y="65" class="node-title">FW1</text>
                    <text y="85" class="node-subtitle" id="label-fw1-status">(Active)</text>
                </g>

                <g class="node" id="node-fw2" transform="translate(850, 220)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-shield" class="node-icon" />
                    <text y="65" class="node-title">FW2</text>
                    <text y="85" class="node-subtitle" id="label-fw2-status">(Standby)</text>
                </g>

                <g class="node" id="node-ac1" transform="translate(350, 340)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-pulse" class="node-icon" />
                    <use href="#icon-cross" class="error-cross" />
                    <text y="65" class="node-title">AC1</text>
                    <text y="85" class="node-subtitle">(深信服Audit)</text>
                </g>

                <g class="node" id="node-ac2" transform="translate(850, 340)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-pulse" class="node-icon" />
                    <text y="65" class="node-title">AC2</text>
                    <text y="85" class="node-subtitle">(深信服Audit)</text>
                </g>

                <g class="node" id="node-core1" transform="translate(350, 460)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-share" class="node-icon" />
                    <use href="#icon-cross" class="error-cross" />
                    <text y="65" class="node-title">Core1</text>
                    <text y="85" class="node-subtitle">(M-LAG)</text>
                </g>

                <g class="node" id="node-core2" transform="translate(850, 460)">
                    <circle class="node-circle" r="42" />
                    <use href="#icon-share" class="node-icon" />
                    <text y="65" class="node-title">Core2</text>
                    <text y="85" class="node-subtitle">(M-LAG)</text>
                </g>

                <g class="node" id="node-wac1" transform="translate(150, 390)">
                    <circle class="node-circle" r="32" />
                    <use href="#icon-wac" class="node-icon" />
                    <text y="55" class="node-title">无线AC1</text>
                </g>

                <g class="node" id="node-wac2" transform="translate(150, 530)">
                    <circle class="node-circle" r="32" />

                <g class="node" id="node-pr" transform="translate(450, 630)">

                <g class="node" id="node-poe" transform="translate(750, 630)">
                    <circle class="node-circle" r="32" />

                <g class="node" id="node-sp" transform="translate(1050, 630)">

                <g class="node" id="node-wlan-oa" transform="translate(600, 820)">
                    <circle class="node-circle" r="24" style="fill: #1a2a47" />
                    <use href="#icon-mobile" class="node-icon" />
                    <text y="42" class="node-subtitle">OA无线</text>

                <g class="node" id="node-wlan-pr" transform="translate(900, 820)">
                    <circle class="node-circle" r="24" style="fill: #1a2a47" />
                    <use href="#icon-mobile" class="node-icon" />

            <!-- 4. 弹出式提示标签层 -->
            <g id="layer-labels">
                <g class="pop-label" id="label-acl" transform="translate(350, 160)">
                    <rect class="label-bg" width="130" height="30" x="0" y="-20"/>
                    <text x="65" y="0" fill="#ff3333" text-anchor="middle">❌ 隔离策略阻断</text>
                </g>
                <g class="pop-label" id="label-vpn" transform="translate(560, 140)">
                    <rect class="label-bg" width="150" height="30" x="0" y="-20"/>
                    <text x="75" y="0" fill="#d400ff" text-anchor="middle">🔒 IPSec VPN 加密</text>
                </g>
                <g class="pop-label" id="label-capwap" transform="translate(420, 560)">
                    <rect class="label-bg" width="140" height="30" x="0" y="-20"/>
                    <text x="70" y="0" fill="#00ff66" text-anchor="middle">🟢 无线业务流量</text>
                </g>
                <g class="pop-label" id="label-tunnel" transform="translate(580, 590)">
                    <rect class="label-bg" width="150" height="30" x="0" y="-20"/>
                    <text x="75" y="0" fill="#b45f06" text-anchor="middle">🟤 CAPWAP 隧道</text>
                </g>
            </g>

        </svg>
    </div>

    <div class="controls">
        <button class="btn active" onclick="setScenario(1)">01 - 重置拓扑视图</button>
        <button class="btn" onclick="setScenario(2)">02 - 办公访问互联网</button>
        <button class="btn" onclick="setScenario(3)">03 - 办公与业务互访</button>
        <button class="btn" onclick="setScenario(4)">04 - 业务访问总部</button>
        <button class="btn" onclick="setScenario(5)">05 - 核心 Core1 故障</button>
        <button class="btn" onclick="setScenario(6)">06 - 行为管理 AC1 故障</button>
        <button class="btn" onclick="setScenario(7)">07 - 防火墙 FW1 故障</button>
        <button class="btn" onclick="setScenario(8)">08 - 无线流量场景</button>
    </div>

    <!-- AI 分析弹窗 -->
    <div id="ai-modal" class="ai-modal">
        <div class="ai-panel">
            <button class="ai-close" onclick="closeAIModal()">✖</button>
            <h2>✨ AI 网络架构专家深度解析</h2>
            <div id="ai-loading" class="ai-loading">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; margin: 0 auto;"><circle cx="12" cy="12" r="10" stroke-dasharray="30 60" stroke-linecap="round"/></svg>
                <div style="margin-top: 15px;">正在连接大模型分析拓扑架构...</div>
            </div>
            <div id="ai-content" class="ai-content"></div>
        </div>
    </div>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <script>
        const scenarios = {
            1: {
                title: "正常就绪",
                desc: "全网拓扑运行正常，主备链路状态良好，等待业务流量接入。",
                activeFlows: [],
                failedNodes: [],
                labels: []
            },
            2: {
                title: "办公访问互联网",
                desc: "办公终端流量经由 Core1、深信服审计后，从主防火墙 FW1 访问互联网出口。",
                activeFlows: ["flow-oa-net"],
                failedNodes: [],
                labels: []
            },
            3: {
                title: "办公与业务互访 (隔离)",
                desc: "办公网尝试访问生产网，流量经 Core1 到达 FW1，触发跨安全域隔离策略被阻断。",
                activeFlows: ["flow-oa-pr"],
                failedNodes: [],
                labels: ["label-acl"]
            },
            4: {
                title: "业务访问总部",
                desc: "办公与生产网同时发往总部，在 FW1 处建立 IPSec VPN 隧道，加密后经公网传输。",
                activeFlows: ["flow-vpn"],
                failedNodes: [],
                labels: ["label-vpn"],
                specialTunnels: ["tunnel-vpn"]
            },
            5: {
                title: "核心 Core1 故障切换",
                desc: "Core1 宕机！M-LAG 及路由协议快速收敛，接入层双归属链路立即切换，流量无缝切换至 Core2 处理。",
                activeFlows: ["flow-backup"],
                failedNodes: ["node-core1"],
                labels: []
            },
            6: {
                title: "行为管理 AC1 故障旁路",
                desc: "深信服 AC1 宕机或 Bypass，流量通过 Core1 与 Core2 的 Peer-link 绕行至 AC2 和 FW2 访问公网。",
                activeFlows: ["flow-fw-fail"], // 物理绕行路径与FW故障类似
                failedNodes: ["node-ac1"],
                labels: []
            },
            7: {
                title: "主防火墙 FW1 故障切换",
                desc: "主防火墙 FW1 宕机！双机热备 HRP 探测到故障，备机 FW2 升主，流量通过链路层绕行至 FW2 转发。",
                activeFlows: ["flow-fw-fail"],
                failedNodes: ["node-fw1"],
                labels: []
            },
            8: {
                title: "无线流量场景",
                desc: "建立 CAPWAP 隧道。OA无线终端的流量被封装至 WAC1，解封装后再次进入 Core1，最终路由至 FW1 出口。",
                activeFlows: ["flow-wlan"],
                failedNodes: [],
                labels: ["label-capwap", "label-tunnel"],
                specialTunnels: ["tunnel-capwap"]
            }
        };

        let currentActiveScenarioId = 1;

        function setScenario(id) {
            currentActiveScenarioId = id;
            // Update UI buttons
            document.querySelectorAll('.btn').forEach((btn, index) => {
                if(index === id - 1) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            const data = scenarios[id];

            // Update texts
            document.getElementById('mode-text').innerText = data.title;
            document.getElementById('desc-text').innerText = data.desc;

            // Reset all flows
            document.querySelectorAll('.flow-track, .flow-path').forEach(el => {
                el.classList.remove('flow-active');
            });
            document.getElementById('tunnel-vpn').style.opacity = '0';
            document.getElementById('tunnel-capwap').style.opacity = '0';

            // Reset nodes
            document.querySelectorAll('.node').forEach(el => {
                el.classList.remove('failed', 'dimmed');
            });
            
            // Reset pop labels
            document.querySelectorAll('.pop-label').forEach(el => {
                el.classList.remove('show');
            });

            // Update fw text statuses
            document.getElementById('label-fw1-status').innerText = "(Active)";
            document.getElementById('label-fw1-status').style.fill = "var(--text-sub)";
            document.getElementById('label-fw2-status').innerText = "(Standby)";
            document.getElementById('label-fw2-status').style.fill = "var(--text-sub)";

            // Activate flows
            data.activeFlows.forEach(flowId => {
                const group = document.getElementById(flowId);
                if(group) {
                    group.querySelectorAll('.flow-track, .flow-path').forEach(el => {
                        el.classList.add('flow-active');
                    });
                }
            });

            // Activate failed nodes and dim others logically connected
            data.failedNodes.forEach(nodeId => {
                document.getElementById(nodeId).classList.add('failed');
                if (nodeId === 'node-fw1') {
                    document.getElementById('label-fw1-status').innerText = "(Failed)";
                    document.getElementById('label-fw1-status').style.fill = "var(--color-err)";
                    document.getElementById('label-fw2-status').innerText = "(Active)";
                    document.getElementById('label-fw2-status').style.fill = "var(--color-oa)";
                }
                // Optional: dim some nodes to show traffic shift
                if (nodeId === 'node-core1') {
                    document.getElementById('node-ac1').classList.add('dimmed');
                    document.getElementById('node-fw1').classList.add('dimmed');
                }
            });

            // Activate labels
            data.labels.forEach(labelId => {
                document.getElementById(labelId).classList.add('show');
            });

            // Special tunnels
            if(data.specialTunnels) {
                data.specialTunnels.forEach(tid => {
                    document.getElementById(tid).style.opacity = '1';
                });
            }
        }

        // --- ✨ Gemini API 大模型集成逻辑 ---
        const apiKey = "";
        
        async function fetchGeminiAnalysis(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "你是一个资深的华为/思科认证网络架构专家(HCIE/CCIE)。请用专业、简洁、严谨的中文分析用户提供的当前园区网络流量场景。请指出流量的转发路径、安全隔离策略的意义、或高可用性(HA)设计在故障时的巧妙之处。回答控制在300字左右，使用段落划分，突出专业重点。" }] 
                }
            };

            const retries = [1000, 2000, 4000, 8000, 16000];
            for (let attempt = 0; attempt <= retries.length; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    if (attempt === retries.length) {
                        throw new Error("AI 分析请求超时或失败，网络服务异常，请稍后重试。");
                    }
                    // 指数退避策略 (Exponential backoff)
                    await new Promise(resolve => setTimeout(resolve, retries[attempt]));
                }
            }
        }

        async function analyzeCurrentScenario() {
            const modal = document.getElementById('ai-modal');
            const contentDiv = document.getElementById('ai-content');
            const loadingDiv = document.getElementById('ai-loading');
            
            modal.classList.add('show');
            contentDiv.innerHTML = '';
            loadingDiv.style.display = 'block';

            const data = scenarios[currentActiveScenarioId];
            const prompt = `当前展示的园区网场景名称是：【${data.title}】。场景的具体描述行为：${data.desc}。请基于大型企业网络架构最佳实践，为我深度解析这个场景下的网络行为逻辑、设计优点或潜在的影响。`;

            try {
                const aiText = await fetchGeminiAnalysis(prompt);
                loadingDiv.style.display = 'none';
                
                // 解析返回的简单 Markdown (加粗、斜体和换行)
                const formattedText = aiText
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br/>');
                contentDiv.innerHTML = formattedText;
            } catch (error) {
                loadingDiv.style.display = 'none';
                contentDiv.innerHTML = `<span style="color: var(--color-err);">⚠️ ${error.message}</span>`;
            }
        }

        function closeAIModal() {
            document.getElementById('ai-modal').classList.remove('show');
        }

        // Initialize scene
        setScenario(1);
    </script>
</body>
</html>
